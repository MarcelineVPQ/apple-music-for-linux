name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - name: Build and publish AppImage
        run: npx electron-builder --linux AppImage --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

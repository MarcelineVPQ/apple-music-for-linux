<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF66CC"/>
      <stop offset="0.55" stop-color="#E01F9B"/>
      <stop offset="1" stop-color="#A10C68"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- fuchsia squircle -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#sheen)"/>

  <!-- centre-aligned equalizer bars (audio motif, distinct from Apple's notes) -->
  <g fill="#ffffff">
    <rect x="129" y="176" width="44" height="160" rx="22" opacity="0.92"/>
    <rect x="199" y="116" width="44" height="280" rx="22"/>
    <rect x="269" y="151" width="44" height="210" rx="22" opacity="0.88"/>
    <rect x="339" y="131" width="44" height="250" rx="22"/>
  </g>
</svg>

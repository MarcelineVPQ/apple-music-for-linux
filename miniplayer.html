<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --pill-bg: rgba(24, 24, 26, 0.72);
    --pill-border: rgba(255, 255, 255, 0.09);
    --fg: #f5f5f7;
    --fg-dim: #a0a0a5;
    --btn-hover: rgba(255, 255, 255, 0.12);
    --accent: #fa2c56;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --pill-bg: rgba(245, 245, 247, 0.78);
      --pill-border: rgba(0, 0, 0, 0.08);
      --fg: #1d1d1f;
      --fg-dim: #6e6e73;
      --btn-hover: rgba(0, 0, 0, 0.08);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body { background: transparent; }
  body {
    font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Ubuntu, Cantarell, sans-serif;
    height: 100vh;
    padding: 4px;
    -webkit-app-region: drag;
    overflow: hidden;
  }
  #pill {
    height: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 12px 4px 4px;
    background: var(--pill-bg);
    border: 1px solid var(--pill-border);
    border-radius: 18px;
    backdrop-filter: blur(20px);
    color: var(--fg);
  }
  #art {
    -webkit-app-region: no-drag;
    width: 54px;
    height: 54px;
    border-radius: 14px;
    background: var(--btn-hover);
    object-fit: cover;
    flex-shrink: 0;
    cursor: pointer;
  }
  #controls { display: flex; align-items: center; }
  button {
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    border-radius: 8px;
    color: var(--fg);
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  button:hover { background: var(--btn-hover); }
  button svg { width: 17px; height: 17px; fill: currentColor; }
  button.small { width: 30px; height: 30px; color: var(--fg-dim); }
  button.small svg { width: 14px; height: 14px; }
  button.small.active { color: var(--accent); }
  #info {
    flex: 1;
    min-width: 0;
    text-align: center;
  }
  #title {
    font-size: 12.5px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #artist {
    font-size: 11px;
    color: var(--fg-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }
  #right { display: flex; align-items: center; gap: 2px; }
  #volume {
    -webkit-app-region: no-drag;
    -webkit-appearance: none;
    width: 64px;
    height: 4px;
    border-radius: 2px;
    background: var(--btn-hover);
    outline: none;
    cursor: pointer;
  }
  #volume::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--fg);
  }
</style>
</head>
<body>
  <div id="pill">
    <img id="art" title="Open full player" alt="">
    <div id="controls">
      <button id="shuffle" class="small" title="Shuffle">
        <svg viewBox="0 0 16 16"><path d="M11.5 2.5h3v3l-1.15-1.15-2.8 2.8-1.06-1.06 2.8-2.8L11.5 2.5zM1 3h2.9c.5 0 .97.2 1.32.55l1.53 1.53-1.06 1.06-1.53-1.53a.37.37 0 0 0-.26-.11H1V3zm13.5 7.5v3h-3l1.15-1.15-2.44-2.44a.37.37 0 0 0-.26-.11H8v-1.5h1.95c.5 0 .97.2 1.32.55l2.44 2.44 1.29-1.29zM1 11.5h2.9c.1 0 .19-.04.26-.11l6.19-6.19 1.5 1.06-6.63 6.63c-.35.35-.83.55-1.32.55H1v-1.5z"/></svg>
      </button>
      <button id="prev" title="Previous">
        <svg viewBox="0 0 16 16"><path d="M8.7 7.35 14.6 3.6a.75.75 0 0 1 1.15.63v7.54a.75.75 0 0 1-1.15.63L8.7 8.65v3.12a.75.75 0 0 1-1.15.63L1.3 8.63a.75.75 0 0 1 0-1.26L7.55 3.6a.75.75 0 0 1 1.15.63v3.12z"/></svg>
      </button>
      <button id="playpause" title="Play / Pause">
        <svg id="icon-play" viewBox="0 0 16 16"><path d="M4 2.3a.75.75 0 0 1 1.15-.63l9 5.7a.75.75 0 0 1 0 1.26l-9 5.7A.75.75 0 0 1 4 13.7V2.3z"/></svg>
        <svg id="icon-pause" viewBox="0 0 16 16" style="display:none"><path d="M4 2h2.5v12H4zM9.5 2H12v12H9.5z"/></svg>
      </button>
      <button id="next" title="Next">
        <svg viewBox="0 0 16 16"><path d="M7.3 7.35 1.4 3.6a.75.75 0 0 0-1.15.63v7.54a.75.75 0 0 0 1.15.63l5.9-3.75v3.12a.75.75 0 0 0 1.15.63l6.25-3.77a.75.75 0 0 0 0-1.26L8.45 3.6a.75.75 0 0 0-1.15.63v3.12z"/></svg>
      </button>
      <button id="repeat" class="small" title="Repeat">
        <svg viewBox="0 0 16 16"><path d="M3.5 5.5h7V7l3-2.25L10.5 2.5V4h-7A2.5 2.5 0 0 0 1 6.5V8h1.5V6.5c0-.55.45-1 1-1zm9 5h-7V9l-3 2.25 3 2.25V12h7A2.5 2.5 0 0 0 15 9.5V8h-1.5v1.5c0 .55-.45 1-1 1z"/></svg>
        <span id="repeat-one" style="display:none;position:absolute;font-size:8px;font-weight:700;margin-top:-1px">1</span>
      </button>
    </div>
    <div id="info">
      <div id="title">Not playing</div>
      <div id="artist"></div>
    </div>
    <div id="right">
      <button id="mute" class="small" title="Mute / Unmute">
        <svg id="icon-vol" viewBox="0 0 16 16"><path d="M8.5 2.06a.75.75 0 0 1 .43.68v10.52a.75.75 0 0 1-1.21.59L4.6 11.5H2.25a.75.75 0 0 1-.75-.75v-5.5A.75.75 0 0 1 2.25 4.5H4.6l3.12-2.35a.75.75 0 0 1 .78-.09zM11.3 5.53a.75.75 0 0 1 1.06 0 3.5 3.5 0 0 1 0 4.95.75.75 0 1 1-1.06-1.07 2 2 0 0 0 0-2.82.75.75 0 0 1 0-1.06zm1.94-1.94a.75.75 0 0 1 1.06 0 6.25 6.25 0 0 1 0 8.83.75.75 0 1 1-1.06-1.06 4.75 4.75 0 0 0 0-6.71.75.75 0 0 1 0-1.06z"/></svg>
        <svg id="icon-muted" viewBox="0 0 16 16" style="display:none"><path d="M8.5 2.06a.75.75 0 0 1 .43.68v10.52a.75.75 0 0 1-1.21.59L4.6 11.5H2.25a.75.75 0 0 1-.75-.75v-5.5A.75.75 0 0 1 2.25 4.5H4.6l3.12-2.35a.75.75 0 0 1 .78-.09zM11.03 6.22a.75.75 0 0 1 1.06 0L13 7.13l.91-.91a.75.75 0 1 1 1.06 1.06l-.91.91.91.91a.75.75 0 1 1-1.06 1.06L13 9.25l-.91.91a.75.75 0 1 1-1.06-1.06l.91-.91-.91-.91a.75.75 0 0 1 0-1.06z"/></svg>
      </button>
      <input id="volume" type="range" min="0" max="100" value="100" title="Volume">
      <button id="queue" class="small" title="Playlist / Up Next">
        <svg viewBox="0 0 16 16"><path d="M1 3h9v1.5H1V3zm0 4h9v1.5H1V7zm0 4h6v1.5H1V11zm11.5-8H14v7.55a2.5 2.5 0 1 1-1.5-.51V3z"/></svg>
      </button>
      <button id="expand" class="small" title="Full player">
        <svg viewBox="0 0 16 16"><path d="M2 6V2.75A.75.75 0 0 1 2.75 2H6v1.5H3.5V6H2zm12-3.25V6h-1.5V3.5H10V2h3.25a.75.75 0 0 1 .75.75zM2 10v3.25c0 .41.34.75.75.75H6v-1.5H3.5V10H2zm12 3.25V10h-1.5v2.5H10V14h3.25a.75.75 0 0 0 .75-.75z"/></svg>
      </button>
    </div>
  </div>
<script>
  const { ipcRenderer } = require('electron')

  const send = (cmd) => ipcRenderer.send('mini-command', cmd)
  document.getElementById('shuffle').onclick = () => send('toggleShuffle')
  document.getElementById('prev').onclick = () => send('previous')
  document.getElementById('playpause').onclick = () => send('playPause')
  document.getElementById('next').onclick = () => send('next')
  document.getElementById('repeat').onclick = () => send('cycleRepeat')
  document.getElementById('queue').onclick = () => send('queue')
  document.getElementById('expand').onclick = () => send('expand')
  document.getElementById('art').onclick = () => send('expand')

  const volumeSlider = document.getElementById('volume')
  let draggingVolume = false
  let lastVolume = 1
  volumeSlider.onpointerdown = () => { draggingVolume = true }
  volumeSlider.onpointerup = () => { draggingVolume = false }
  volumeSlider.oninput = () => {
    ipcRenderer.send('mini-command', 'setVolume', volumeSlider.value / 100)
    updateMuteIcon(volumeSlider.value / 100)
  }
  document.getElementById('mute').onclick = () => {
    const current = volumeSlider.value / 100
    const next = current > 0 ? 0 : (lastVolume > 0 ? lastVolume : 1)
    if (current > 0) lastVolume = current
    volumeSlider.value = next * 100
    ipcRenderer.send('mini-command', 'setVolume', next)
    updateMuteIcon(next)
  }
  function updateMuteIcon(volume) {
    document.getElementById('icon-vol').style.display = volume > 0 ? '' : 'none'
    document.getElementById('icon-muted').style.display = volume > 0 ? 'none' : ''
  }

  ipcRenderer.on('now-playing', (event, state) => {
    if (!state || !state.ok) return
    document.getElementById('title').textContent = state.title || 'Not playing'
    document.getElementById('artist').textContent = state.artist || ''
    const art = document.getElementById('art')
    if (state.artwork && art.src !== state.artwork) art.src = state.artwork
    document.getElementById('icon-play').style.display = state.isPlaying ? 'none' : ''
    document.getElementById('icon-pause').style.display = state.isPlaying ? '' : 'none'
    document.getElementById('shuffle').classList.toggle('active', !!state.shuffle)
    document.getElementById('repeat').classList.toggle('active', state.repeat > 0)
    document.getElementById('repeat-one').style.display = state.repeat === 1 ? '' : 'none'
    if (!draggingVolume && typeof state.volume === 'number') {
      volumeSlider.value = Math.round(state.volume * 100)
      updateMuteIcon(state.volume)
    }
  })
</script>
</body>
</html>

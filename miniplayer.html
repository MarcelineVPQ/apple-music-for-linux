<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #f5f5f7;
    --fg: #1d1d1f;
    --fg-dim: #6e6e73;
    --btn-hover: rgba(0, 0, 0, 0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e20;
      --fg: #f5f5f7;
      --fg-dim: #98989d;
      --btn-hover: rgba(255, 255, 255, 0.1);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body {
    font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Ubuntu, Cantarell, sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    -webkit-app-region: drag;
    overflow: hidden;
  }
  #art {
    width: 84px;
    height: 84px;
    border-radius: 6px;
    background: var(--btn-hover);
    object-fit: cover;
    flex-shrink: 0;
  }
  #info { flex: 1; min-width: 0; }
  #title {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #artist {
    font-size: 12px;
    color: var(--fg-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  #controls {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
  }
  button {
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    border-radius: 6px;
    color: var(--fg);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  button:hover { background: var(--btn-hover); }
  button svg { width: 16px; height: 16px; fill: currentColor; }
  #corner {
    position: absolute;
    top: 6px;
    right: 6px;
    display: flex;
    gap: 2px;
  }
  #corner button { width: 24px; height: 24px; color: var(--fg-dim); }
  #corner button svg { width: 12px; height: 12px; }
</style>
</head>
<body>
  <img id="art" alt="">
  <div id="info">
    <div id="title">Not playing</div>
    <div id="artist"></div>
    <div id="controls">
      <button id="prev" title="Previous">
        <svg viewBox="0 0 16 16"><path d="M1.5 2a.75.75 0 0 1 .75.75v4.4l11.1-5.53A.75.75 0 0 1 14.5 2.3v11.4a.75.75 0 0 1-1.15.63L2.25 8.85v4.4a.75.75 0 0 1-1.5 0v-10.5A.75.75 0 0 1 1.5 2z"/></svg>
      </button>
      <button id="playpause" title="Play / Pause">
        <svg id="icon-play" viewBox="0 0 16 16"><path d="M4 2.3a.75.75 0 0 1 1.15-.63l9 5.7a.75.75 0 0 1 0 1.26l-9 5.7A.75.75 0 0 1 4 13.7V2.3z"/></svg>
        <svg id="icon-pause" viewBox="0 0 16 16" style="display:none"><path d="M4 2h2.5v12H4zM9.5 2H12v12H9.5z"/></svg>
      </button>
      <button id="next" title="Next">
        <svg viewBox="0 0 16 16"><path d="M14.5 2a.75.75 0 0 0-.75.75v4.4L2.65 1.62A.75.75 0 0 0 1.5 2.3v11.4a.75.75 0 0 0 1.15.63l11.1-5.48v4.4a.75.75 0 0 0 1.5 0v-10.5A.75.75 0 0 0 14.5 2z"/></svg>
      </button>
    </div>
  </div>
  <div id="corner">
    <button id="expand" title="Full player">
      <svg viewBox="0 0 16 16"><path d="M2 6V2.75A.75.75 0 0 1 2.75 2H6v1.5H3.5V6H2zm12-3.25V6h-1.5V3.5H10V2h3.25a.75.75 0 0 1 .75.75zM2 10v3.25c0 .41.34.75.75.75H6v-1.5H3.5V10H2zm12 3.25V10h-1.5v2.5H10V14h3.25a.75.75 0 0 0 .75-.75z"/></svg>
    </button>
  </div>
<script>
  const { ipcRenderer } = require('electron')

  const send = (cmd) => ipcRenderer.send('mini-command', cmd)
  document.getElementById('prev').onclick = () => send('previous')
  document.getElementById('next').onclick = () => send('next')
  document.getElementById('playpause').onclick = () => send('playPause')
  document.getElementById('expand').onclick = () => send('expand')

  ipcRenderer.on('now-playing', (event, state) => {
    if (!state || !state.ok) return
    document.getElementById('title').textContent = state.title || 'Not playing'
    document.getElementById('artist').textContent = state.artist || ''
    const art = document.getElementById('art')
    if (state.artwork && art.src !== state.artwork) art.src = state.artwork
    document.getElementById('icon-play').style.display = state.isPlaying ? 'none' : ''
    document.getElementById('icon-pause').style.display = state.isPlaying ? '' : 'none'
  })
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --pill-bg: rgba(24, 24, 26, 0.78);
    --pill-border: rgba(255, 255, 255, 0.09);
    --lcd-bg: rgba(255, 255, 255, 0.07);
    --fg: #f5f5f7;
    --fg-dim: #a0a0a5;
    --btn-hover: rgba(255, 255, 255, 0.12);
    --accent: #fa2c56;
    --progress: rgba(255, 255, 255, 0.9);
    --progress-track: rgba(255, 255, 255, 0.18);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --pill-bg: rgba(245, 245, 247, 0.82);
      --pill-border: rgba(0, 0, 0, 0.08);
      --lcd-bg: rgba(0, 0, 0, 0.05);
      --fg: #1d1d1f;
      --fg-dim: #6e6e73;
      --btn-hover: rgba(0, 0, 0, 0.08);
      --progress: rgba(0, 0, 0, 0.65);
      --progress-track: rgba(0, 0, 0, 0.15);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body { background: transparent; }
  body {
    font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Ubuntu, Cantarell, sans-serif;
    height: 100vh;
    padding: 4px;
    -webkit-app-region: drag;
    overflow: hidden;
  }
  #pill {
    height: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    background: var(--pill-bg);
    border: 1px solid var(--pill-border);
    border-radius: 14px;
    backdrop-filter: blur(20px);
    color: var(--fg);
  }
  button {
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    border-radius: 7px;
    color: var(--fg);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  button:hover { background: var(--btn-hover); }
  button svg { width: 16px; height: 16px; fill: currentColor; }
  button.small { width: 28px; height: 28px; color: var(--fg-dim); }
  button.small svg { width: 14px; height: 14px; }
  button.small:hover { color: var(--fg); }
  button.small.active { color: var(--accent); }
  #controls, #right { display: flex; align-items: center; gap: 2px; }

  /* the LCD — Apple's inset now-playing display */
  #lcd {
    -webkit-app-region: no-drag;
    position: relative;
    flex: 1;
    min-width: 0;
    height: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 10px;
    background: var(--lcd-bg);
    border-radius: 8px;
    overflow: hidden;
  }
  #art {
    width: 38px;
    height: 38px;
    border-radius: 4px;
    background: var(--btn-hover);
    object-fit: cover;
    flex-shrink: 0;
    cursor: pointer;
  }
  #info { flex: 1; min-width: 0; text-align: center; padding-bottom: 3px; }
  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    min-width: 0;
  }
  #title {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  #rating-badge {
    flex-shrink: 0;
    font-size: 8px;
    font-weight: 700;
    line-height: 1;
    padding: 2px 3px;
    border-radius: 3px;
    color: var(--fg-dim);
    background: var(--btn-hover);
  }
  #fav {
    -webkit-app-region: no-drag;
    flex-shrink: 0;
    background: none;
    border: none;
    padding: 0;
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--fg-dim);
  }
  #fav:hover { color: var(--fg); }
  #fav.active { color: var(--accent); }
  #fav svg { width: 13px; height: 13px; fill: currentColor; }
  /* elapsed / remaining, revealed when hovering the LCD (like Apple's) */
  .lcd-time {
    position: absolute;
    bottom: 3px;
    font-size: 9px;
    font-variant-numeric: tabular-nums;
    color: var(--fg-dim);
    opacity: 0;
    transition: opacity 0.15s ease;
    pointer-events: none;
  }
  #time-elapsed { left: 9px; }
  #time-remaining { right: 9px; }
  #lcd:hover .lcd-time { opacity: 1; }
  #subtitle {
    font-size: 11px;
    color: var(--fg-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }
  #more {
    width: 26px;
    height: 26px;
    color: var(--fg-dim);
  }
  #more svg { width: 14px; height: 14px; }
  /* hairline progress along the LCD's bottom edge, like Apple's */
  #progress-track {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 8px;
    cursor: pointer;
  }
  #progress-track::before {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 2px;
    background: var(--progress-track);
  }
  #progress-fill {
    position: absolute;
    left: 0;
    bottom: 0;
    height: 2px;
    width: 0%;
    background: var(--progress);
    transition: width 1s linear;
  }
  #volume {
    -webkit-app-region: no-drag;
    -webkit-appearance: none;
    width: 60px;
    height: 4px;
    margin: 0 4px 0 2px;
    border-radius: 2px;
    background: var(--progress-track);
    outline: none;
    cursor: pointer;
    flex-shrink: 0;
  }
  #volume::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--fg);
  }
</style>
</head>
<body>
  <div id="pill">
    <div id="controls">
      <button id="shuffle" class="small" title="Shuffle">
        <svg viewBox="0 0 16 16"><path d="M11.5 2.5h3v3l-1.15-1.15-2.8 2.8-1.06-1.06 2.8-2.8L11.5 2.5zM1 3h2.9c.5 0 .97.2 1.32.55l1.53 1.53-1.06 1.06-1.53-1.53a.37.37 0 0 0-.26-.11H1V3zm13.5 7.5v3h-3l1.15-1.15-2.44-2.44a.37.37 0 0 0-.26-.11H8v-1.5h1.95c.5 0 .97.2 1.32.55l2.44 2.44 1.29-1.29zM1 11.5h2.9c.1 0 .19-.04.26-.11l6.19-6.19 1.5 1.06-6.63 6.63c-.35.35-.83.55-1.32.55H1v-1.5z"/></svg>
      </button>
      <button id="prev" title="Previous">
        <svg viewBox="0 0 16 16"><path d="M8.7 7.35 14.6 3.6a.75.75 0 0 1 1.15.63v7.54a.75.75 0 0 1-1.15.63L8.7 8.65v3.12a.75.75 0 0 1-1.15.63L1.3 8.63a.75.75 0 0 1 0-1.26L7.55 3.6a.75.75 0 0 1 1.15.63v3.12z"/></svg>
      </button>
      <button id="playpause" title="Play / Pause">
        <svg id="icon-play" viewBox="0 0 16 16"><path d="M4 2.3a.75.75 0 0 1 1.15-.63l9 5.7a.75.75 0 0 1 0 1.26l-9 5.7A.75.75 0 0 1 4 13.7V2.3z"/></svg>
        <svg id="icon-pause" viewBox="0 0 16 16" style="display:none"><path d="M4 2h2.5v12H4zM9.5 2H12v12H9.5z"/></svg>
      </button>
      <button id="next" title="Next">
        <svg viewBox="0 0 16 16"><path d="M7.3 7.35 1.4 3.6a.75.75 0 0 0-1.15.63v7.54a.75.75 0 0 0 1.15.63l5.9-3.75v3.12a.75.75 0 0 0 1.15.63l6.25-3.77a.75.75 0 0 0 0-1.26L8.45 3.6a.75.75 0 0 0-1.15.63v3.12z"/></svg>
      </button>
      <button id="repeat" class="small" title="Repeat">
        <svg viewBox="0 0 16 16"><path d="M3.5 5.5h7V7l3-2.25L10.5 2.5V4h-7A2.5 2.5 0 0 0 1 6.5V8h1.5V6.5c0-.55.45-1 1-1zm9 5h-7V9l-3 2.25 3 2.25V12h7A2.5 2.5 0 0 0 15 9.5V8h-1.5v1.5c0 .55-.45 1-1 1z"/></svg>
        <span id="repeat-one" style="display:none;position:absolute;font-size:8px;font-weight:700;margin-top:-1px">1</span>
      </button>
    </div>

    <div id="lcd">
      <img id="art" title="Open full player" alt="">
      <div id="info">
        <div class="title-row">
          <span id="title">Not playing</span>
          <span id="rating-badge" style="display:none">E</span>
          <button id="fav" title="Favorite">
            <svg id="icon-fav-off" viewBox="0 0 16 16"><path d="M8 1.6l1.86 3.95 4.14.5-3.06 2.86.83 4.19L8 11.6l-3.77 1.5.83-4.19L2 6.05l4.14-.5z" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/></svg>
            <svg id="icon-fav-on" viewBox="0 0 16 16" style="display:none"><path d="M8 1.6l1.86 3.95 4.14.5-3.06 2.86.83 4.19L8 11.6l-3.77 1.5.83-4.19L2 6.05l4.14-.5z"/></svg>
          </button>
        </div>
        <div id="subtitle"></div>
      </div>
      <button id="more" class="small" title="More">
        <svg viewBox="0 0 16 16"><circle cx="3" cy="8" r="1.5"/><circle cx="8" cy="8" r="1.5"/><circle cx="13" cy="8" r="1.5"/></svg>
      </button>
      <span id="time-elapsed" class="lcd-time">0:00</span>
      <span id="time-remaining" class="lcd-time">-0:00</span>
      <div id="progress-track"><div id="progress-fill"></div></div>
    </div>

    <div id="right">
      <button id="lyrics" class="small" title="Lyrics">
        <svg viewBox="0 0 16 16"><path d="M8 1.5c-3.87 0-7 2.57-7 5.75 0 1.84 1.05 3.47 2.68 4.52-.13.72-.53 1.5-1.32 2.14-.18.15-.06.44.17.42 1.55-.15 2.77-.82 3.55-1.48.61.13 1.25.2 1.92.2 3.87 0 7-2.57 7-5.8S11.87 1.5 8 1.5zM4.5 8.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm3.5 0a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm3.5 0a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/></svg>
      </button>
      <button id="queue" class="small" title="Playlist / Up Next">
        <svg viewBox="0 0 16 16"><path d="M1 3h9v1.5H1V3zm0 4h9v1.5H1V7zm0 4h6v1.5H1V11zm11.5-8H14v7.55a2.5 2.5 0 1 1-1.5-.51V3z"/></svg>
      </button>
      <button id="mute" class="small" title="Mute / Unmute">
        <svg id="icon-vol" viewBox="0 0 16 16"><path d="M8.5 2.06a.75.75 0 0 1 .43.68v10.52a.75.75 0 0 1-1.21.59L4.6 11.5H2.25a.75.75 0 0 1-.75-.75v-5.5A.75.75 0 0 1 2.25 4.5H4.6l3.12-2.35a.75.75 0 0 1 .78-.09zM11.3 5.53a.75.75 0 0 1 1.06 0 3.5 3.5 0 0 1 0 4.95.75.75 0 1 1-1.06-1.07 2 2 0 0 0 0-2.82.75.75 0 0 1 0-1.06zm1.94-1.94a.75.75 0 0 1 1.06 0 6.25 6.25 0 0 1 0 8.83.75.75 0 1 1-1.06-1.06 4.75 4.75 0 0 0 0-6.71.75.75 0 0 1 0-1.06z"/></svg>
        <svg id="icon-muted" viewBox="0 0 16 16" style="display:none"><path d="M8.5 2.06a.75.75 0 0 1 .43.68v10.52a.75.75 0 0 1-1.21.59L4.6 11.5H2.25a.75.75 0 0 1-.75-.75v-5.5A.75.75 0 0 1 2.25 4.5H4.6l3.12-2.35a.75.75 0 0 1 .78-.09zM11.03 6.22a.75.75 0 0 1 1.06 0L13 7.13l.91-.91a.75.75 0 1 1 1.06 1.06l-.91.91.91.91a.75.75 0 1 1-1.06 1.06L13 9.25l-.91.91a.75.75 0 1 1-1.06-1.06l.91-.91-.91-.91a.75.75 0 0 1 0-1.06z"/></svg>
      </button>
      <input id="volume" type="range" min="0" max="100" value="100" title="Volume">
    </div>
  </div>
<script>
  const { ipcRenderer } = require('electron')

  // adaptive album color: retint the pill to the current artwork (null resets)
  ipcRenderer.on('palette', (event, p) => {
    const r = document.documentElement.style
    const keys = ['--accent', '--pill-bg', '--lcd-bg', '--progress']
    if (!p) { keys.forEach(k => r.removeProperty(k)); return }
    r.setProperty('--accent', p.accent)
    r.setProperty('--pill-bg', p.bg + 'cc')      // translucent album-tinted surface
    r.setProperty('--lcd-bg', p.accent + '1f')   // faint accent wash on the LCD
    r.setProperty('--progress', p.accent)
  })

  const send = (cmd, value) => ipcRenderer.send('mini-command', cmd, value)
  document.getElementById('shuffle').onclick = () => send('toggleShuffle')
  document.getElementById('prev').onclick = () => send('previous')
  document.getElementById('playpause').onclick = () => send('playPause')
  document.getElementById('next').onclick = () => send('next')
  document.getElementById('repeat').onclick = () => send('cycleRepeat')
  document.getElementById('queue').onclick = () => send('queue')
  document.getElementById('lyrics').onclick = () => send('lyrics')
  document.getElementById('more').onclick = () => send('moreMenu')
  document.getElementById('art').onclick = () => send('expand')
  document.getElementById('fav').onclick = () => send('toggleFavorite')

  const fmtTime = (s) => {
    s = Math.max(0, Math.round(s || 0))
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0')
  }
  function setFavorite(rating) {
    const on = rating === 1
    document.getElementById('fav').classList.toggle('active', on)
    document.getElementById('icon-fav-off').style.display = on ? 'none' : ''
    document.getElementById('icon-fav-on').style.display = on ? '' : 'none'
    document.getElementById('fav').title = on ? 'Undo Favorite' : 'Favorite'
  }
  ipcRenderer.on('favorite-state', (event, fav) => {
    if (fav && fav.ok) setFavorite(fav.rating)
  })

  let currentDuration = 0
  const progressTrack = document.getElementById('progress-track')
  progressTrack.onclick = (e) => {
    if (!currentDuration) return
    const rect = progressTrack.getBoundingClientRect()
    const fraction = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width))
    send('seek', fraction * currentDuration)
  }

  const volumeSlider = document.getElementById('volume')
  let draggingVolume = false
  let lastVolume = 1
  volumeSlider.onpointerdown = () => { draggingVolume = true }
  volumeSlider.onpointerup = () => { draggingVolume = false }
  volumeSlider.oninput = () => {
    send('setVolume', volumeSlider.value / 100)
    updateMuteIcon(volumeSlider.value / 100)
  }
  document.getElementById('mute').onclick = () => {
    const current = volumeSlider.value / 100
    const next = current > 0 ? 0 : (lastVolume > 0 ? lastVolume : 1)
    if (current > 0) lastVolume = current
    volumeSlider.value = next * 100
    send('setVolume', next)
    updateMuteIcon(next)
  }
  function updateMuteIcon(volume) {
    document.getElementById('icon-vol').style.display = volume > 0 ? '' : 'none'
    document.getElementById('icon-muted').style.display = volume > 0 ? 'none' : ''
  }

  ipcRenderer.on('now-playing', (event, state) => {
    if (!state || !state.ok) return
    document.getElementById('title').textContent = state.title || 'Not playing'
    document.getElementById('subtitle').textContent =
      state.artist ? state.artist + (state.album ? ' — ' + state.album : '') : ''
    const art = document.getElementById('art')
    if (state.artwork && art.src !== state.artwork) art.src = state.artwork
    document.getElementById('icon-play').style.display = state.isPlaying ? 'none' : ''
    document.getElementById('icon-pause').style.display = state.isPlaying ? '' : 'none'
    document.getElementById('shuffle').classList.toggle('active', !!state.shuffle)
    document.getElementById('repeat').classList.toggle('active', state.repeat > 0)
    document.getElementById('repeat-one').style.display = state.repeat === 1 ? '' : 'none'
    document.getElementById('rating-badge').style.display =
      state.contentRating === 'explicit' ? '' : 'none'
    currentDuration = state.duration || 0
    document.getElementById('progress-fill').style.width =
      currentDuration ? (state.playbackTime / currentDuration * 100) + '%' : '0%'
    document.getElementById('time-elapsed').textContent = fmtTime(state.playbackTime)
    document.getElementById('time-remaining').textContent =
      currentDuration ? '-' + fmtTime(currentDuration - state.playbackTime) : '-0:00'
    if (!draggingVolume && typeof state.volume === 'number') {
      volumeSlider.value = Math.round(state.volume * 100)
      updateMuteIcon(state.volume)
    }
  })
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: rgba(22, 22, 24, 0.88);
    --border: rgba(255, 255, 255, 0.09);
    --fg: #f5f5f7;
    --fg-dim: rgba(245, 245, 247, 0.35);
    --btn-hover: rgba(255, 255, 255, 0.12);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: rgba(245, 245, 247, 0.9);
      --border: rgba(0, 0, 0, 0.08);
      --fg: #1d1d1f;
      --fg-dim: rgba(29, 29, 31, 0.35);
      --btn-hover: rgba(0, 0, 0, 0.08);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body { background: transparent; height: 100%; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Ubuntu, Cantarell, sans-serif;
    padding: 4px;
    -webkit-app-region: drag;
  }
  #card {
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(24px);
    color: var(--fg);
    overflow: hidden;
  }
  #header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px 8px 16px;
  }
  #song {
    flex: 1;
    min-width: 0;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--fg-dim);
  }
  #close {
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    border-radius: 6px;
    color: var(--fg-dim);
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  #close:hover { background: var(--btn-hover); color: var(--fg); }
  #close svg { width: 12px; height: 12px; fill: currentColor; }
  #lines {
    -webkit-app-region: no-drag;
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px 40vh 20px;
    scroll-behavior: smooth;
  }
  #lines::-webkit-scrollbar { width: 0; }
  .line {
    font-size: 21px;
    font-weight: 700;
    line-height: 1.3;
    padding: 7px 0;
    color: var(--fg-dim);
    filter: blur(0.6px);
    cursor: pointer;
    transition: color 0.3s ease, filter 0.3s ease;
  }
  .line:hover { color: var(--fg); filter: none; }
  .line.active { color: var(--fg); filter: none; }
  #empty {
    padding: 24px 20px;
    font-size: 13px;
    color: var(--fg-dim);
    text-align: center;
  }
</style>
</head>
<body>
  <div id="card">
    <div id="header">
      <div id="song">Lyrics</div>
      <button id="close" title="Close">
        <svg viewBox="0 0 16 16"><path d="M3.28 2.22a.75.75 0 0 0-1.06 1.06L6.94 8l-4.72 4.72a.75.75 0 1 0 1.06 1.06L8 9.06l4.72 4.72a.75.75 0 1 0 1.06-1.06L9.06 8l4.72-4.72a.75.75 0 0 0-1.06-1.06L8 6.94 3.28 2.22z"/></svg>
      </button>
    </div>
    <div id="lines"><div id="empty">Play a song to see its lyrics</div></div>
  </div>
<script>
  const { ipcRenderer } = require('electron')

  document.getElementById('close').onclick = () => ipcRenderer.send('lyrics-command', 'close')

  const linesEl = document.getElementById('lines')
  let lines = []
  let activeIndex = -1

  ipcRenderer.on('lyrics-data', (event, data) => {
    lines = data.lines || []
    activeIndex = -1
    document.getElementById('song').textContent =
      data.title ? data.title + (data.artist ? ' — ' + data.artist : '') : 'Lyrics'
    linesEl.scrollTop = 0
    if (!lines.length) {
      linesEl.innerHTML = '<div id="empty">' +
        (data.title ? 'No lyrics available for this song' : 'Play a song to see its lyrics') + '</div>'
      return
    }
    linesEl.innerHTML = ''
    lines.forEach((line, i) => {
      const el = document.createElement('div')
      el.className = 'line'
      el.textContent = line.text
      el.onclick = () => ipcRenderer.send('lyrics-command', 'seek', line.t)
      linesEl.appendChild(el)
    })
  })

  ipcRenderer.on('lyrics-time', (event, playbackTime) => {
    if (!lines.length) return
    let index = -1
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].t <= playbackTime + 0.2) index = i
      else break
    }
    if (index === activeIndex) return
    activeIndex = index
    const els = linesEl.children
    for (let i = 0; i < els.length; i++) els[i].classList.toggle('active', i === index)
    if (index >= 0 && els[index]) {
      els[index].scrollIntoView({ block: 'center', behavior: 'smooth' })
    }
  })
</script>
</body>
</html>
